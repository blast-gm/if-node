<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body style="font-family: sans-serif;">
    <div class="navbar">
        <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/register">Registrar</a></li>
        </ul>
    </div>
    <h2 style="text-align: center;">Minha Conta</h2>
    <p>Bem-vindo à sua conta!</p>
    <div style="width: 300px; margin: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
        <div style="outline: auto; padding: 30px;">
            <h1 style="font-size: 25px; text-align: center;">Informações da Conta</h1>
            <p style="text-align: center;">Aqui estão as informações da sua conta.</p>
            <form id="accountForm" action="/account" method="POST">
                <label style="display: block; text-align: center; font-size: 18px;">Nome de usuário:</label>
                <input type="text" name="realname" required value="{{realname}}" placeholder="Nome completo" style="display: block; margin: auto; width: 100%; height: 30px;"><br>
                <label style="display: block; text-align: center; font-size: 18px;">Endereço</label>
                <input type="text" name="address" required value="{{address}}" placeholder="Endereço" style="display: block; margin: auto; width: 100%; height: 30px;"><br>
                 <label style="display: block; text-align: center; font-size: 18px;">Telefone</label>
                <input type="text" name="phone" required value="{{phone}}" placeholder="Telefone" style="display: block; margin: auto; width: 100%; height: 30px;"><br>
                <label style="display: block; text-align: center; font-size: 18px;">Data de nascimento</label>
                <input type="date" name="birthdate" required value="{{birthdate}}" style="display: block; margin: auto; width: 100%; height: 30px;"><br>

                <button type="submit" style="display: block; margin: auto; width: 100%; height: 30px; font-size: 18px;">Atualizar</button>
            </form>
        </div>
    </div>
    <a href="/dashboard">Voltar ao Dashboard</a>
</body>
<script>
document.addEventListener("DOMContentLoaded", () => {

    const form = document.getElementById("accountForm");

    form.addEventListener("submit", async (e) => {

        e.preventDefault();

        const data = {
            realname: form.realname.value,
            address: form.address.value,
            phone: form.phone.value,
            birthdate: form.birthdate.value
        };

        const response = await fetch("/account", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const text = await response.text();

        alert(text);

    });

});
</script>
</html>
